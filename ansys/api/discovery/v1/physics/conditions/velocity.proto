syntax = "proto3";
package ansys.api.discovery.v1.physics.conditions.velocity;

import "ansys/api/discovery/v1/commonmessages.proto";
import "ansys/api/discovery/v1/physics/physicsmessages.proto";

option csharp_namespace = "Ansys.Api.Discovery.V1.Physics.Conditions.Velocity";

service Velocity
{
  //Velocity condition methods
  rpc Create(VelocityCreationRequest) returns (VelocityCreationResponse);

  rpc SetLocation(SetLocationRequest) returns(SetResponse);

  rpc SetOrientation(SetDirectionRequest) returns(SetResponse);

  rpc SetRX(SetQuantityRequest) returns (SetResponse);
  rpc SetRY(SetQuantityRequest) returns (SetResponse);
  rpc SetRZ(SetQuantityRequest) returns (SetResponse);
  rpc SetRotationalMagnitude(SetQuantityRequest) returns (SetResponse);

  rpc SetIsFixedRX(SetBooleanRequest) returns (SetResponse);
  rpc SetIsFixedRY(SetBooleanRequest) returns (SetResponse);
  rpc SetIsFixedRZ(SetBooleanRequest) returns (SetResponse);

  rpc SetUseRemotePointEnabled(SetBooleanRequest) returns (SetResponse);
  rpc SetRemotePositionX(SetQuantityRequest) returns (SetResponse);
  rpc SetRemotePositionY(SetQuantityRequest) returns (SetResponse);
  rpc SetRemotePositionZ(SetQuantityRequest) returns (SetResponse);

  rpc GetById(GetByIdRequest) returns (GetSingleResponse);
  rpc GetByLabel(GetByLabelRequest) returns (GetSingleResponse);

  rpc GetAll(ParentEntityRequest) returns (GetAllResponse);
}

//Velocity
message VelocityCreationRequest{
  ScopedCreationData creation_data = 1;
  VelocityProperties velocity_properties = 2;
}

message VelocityCreationResponse{
  CreationResponse creation_response = 1;
  VelocityDefinition as_created_data = 2;
}

// Velocity condition definitions
message VelocityProperties {
  VectorOfOptionalQuantities velocity = 1;
  OptionalVector remote_point = 2;
}

message VelocityDefinition {
  PhysicsEntityBaseProperties base_properties = 1;
  repeated string locations = 2;
  VelocityProperties velocity = 3;
}

message GetSingleResponse{
  CommandResponse command_response = 1;
  VelocityDefinition entity_definition = 2;
}

message GetAllResponse{
  CommandResponse command_response = 1;
  repeated VelocityDefinition entity_definitions = 2;
}