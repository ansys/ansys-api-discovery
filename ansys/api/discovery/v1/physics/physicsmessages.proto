syntax = "proto3";

package ansys.api.discovery.v1.physics;

import "ansys/api/discovery/v1/commonenums.proto";
import "ansys/api/discovery/v1/commonmessages.proto";
import "ansys/api/discovery/v1/geometryenums.proto";
import "ansys/api/discovery/v1/physicsenums.proto";

option csharp_namespace = "Ansys.Api.Discovery.V1.Physics";


//
// Rough material wrapper for material parameters until we have a more defined material
message ParameterMaterial {
  EntityIdentifier material_id = 1;
  string material_label = 2;
}

//
// A Variation (represents a row into the variation table)
message Variation {
  EntityIdentifier id = 1;
  string name = 2;
  bool starred = 3;
  repeated InputParameter inputs = 4;
  repeated OutputParameter outputs = 5;
  GuidEntityIdentifier simulation_id = 6;
}

//
// An input parameter
message InputParameter {
  EntityIdentifier id = 1;
  EntityIdentifier parent_id=2;
  string name=3;
  oneof Value
  {
    Quantity quantity=4;
    ParameterMaterial material=5;
  }
  InputParameterType input_type=6;
  EntityIdentifier parent_object_id=7;
  GuidEntityIdentifier parameter_id=8;
}

//
// An output parameter
message OutputParameter {
  EntityIdentifier id = 1;
  EntityIdentifier parent_id = 2;
  string name = 3;
  Quantity quantity = 4;
  GuidEntityIdentifier parameter_id=5;
}

// 
// SIMULATIONS PROTOS
//
message SimulationEntity {
  GuidEntityIdentifier object_id = 1;
  string label = 2;
}

// Common physics data
message PhysicsEntityBaseProperties {
  GuidEntityIdentifier id = 1;
  GuidEntityIdentifier parent_id = 2;
  string label = 3;
  bool suppressed = 4;
}

//location data definitions

message ScopedCreationData{
  optional GuidEntityIdentifier object_id = 1;
  GuidEntityIdentifier simulation_id = 2;
  LocationIdentifier locations = 3;
}

message DoubleSidedScopedCreationData{
  optional GuidEntityIdentifier object_id = 1;
  GuidEntityIdentifier simulation_id = 2;
  LocationIdentifier side1_locations = 3;
  LocationIdentifier side2_locations = 4;
}

message LocationIdentifier{
  repeated EntityIdentifier location_ids = 1;
  optional LocationType location_type = 2;
}

message SetDirectionRequest{
  GuidEntityIdentifier object_id = 1;
  Direction direction = 2;
}


message CommandRequest{
  GuidEntityIdentifier object_id = 1;
}

message SetContactTypeRequest{
  GuidEntityIdentifier object_id = 1;
  ContactType contact_type = 2;
}

message ContactPairs {
  repeated ContactPair contact_pair = 1;
}

message ContactPair {
  repeated EntityIdentifier item1 = 1;
  repeated EntityIdentifier item2 = 2;
}

message ContactProperties {
  ContactType contact_type = 1;
  ContactPairs contact_pairs = 2;

  double friction_coefficient = 3;
  double stiffness_factor = 4;
  double detection_radius_factor = 5;
  Quantity offset = 6;
  Quantity shear_strenght = 7;
  Quantity tensile_strength = 8;
  bool are_strength_limits_set = 9;
  bool adjust_gap_or_overlap = 10;
  bool make_just_touching = 11;
  bool idealize = 12;
  bool specify_thermal_conductance = 13;
  bool specify_electric_conductance = 14;
  Quantity thermal_contact_conductance = 15;
  Quantity thermal_contact_conductivity = 16;
  Quantity thermal_conductance_thickness = 17;
  Quantity electrical_contact_conductance = 18;
  Quantity electrical_contact_conductivity = 19;
  Quantity electrical_conductance_thickness = 20;
  ConductanceOptionType thermal_conductance_option = 21;
  ConductanceOptionType electric_conductance_option = 22;
}

message SetConductanceMethodRequest{
  GuidEntityIdentifier object_id = 1;
  ConductanceOptionType conductance_type = 2;
}

//
// MATERIAL DEFINITIONS
//
enum MaterialState {
  MATERIAL_STATE_SOLID = 0;
  MATERIAL_STATE_FLUID = 1;
  MATERIAL_STATE_GAS = 2;
  MATERIAL_STATE_UNKNOWN = 3;
}

enum ThermalConductivitySpecification {
  THERMAL_CONDUCTIVITY_SPECIFICATION_ISOTROPIC = 0;
  THERMAL_CONDUCTIVITY_SPECIFICATION_ORTHOTROPIC = 1;
}

message MaterialDefinition {
  GuidEntityIdentifier id = 1;
  string label = 2;
  MaterialPhysicalProperties physical_properties = 3;
  MaterialMechanicalProperties mechanical_properties = 4;
  MaterialThermalProperties thermal_properties = 5;
  MaterialElectromagneticProperties electromagnetic_properties = 6;
  MaterialEnvironmentalProperties environmental_properties = 7;
  MaterialAppearanceProperties appearance_properties = 8;
  MaterialState material_state = 9; 
  MaterialSource material_source = 10;
}

message MaterialPhysicalProperties {
  Quantity density = 1;
  Quantity viscosity = 2;
  Quantity molar_mass = 3;
  Quantity tensile_yeld_strength = 4;
  Quantity tensile_ultimate_yeld_strength = 5;
  Quantity compressive_yeld_strength = 6;
  Quantity compressive_ultimate_yeld_strength = 7;
  QuantityGenericTable density_table = 8;
}

message MaterialMechanicalProperties {
  Quantity youngs_modulus = 1;
  Quantity poissons_ratio = 2;
  Quantity shear_modulues = 3;
  Quantity bulk_modulus = 4;
  QuantityGenericTable youngs_modulus_table = 5;
}

message MaterialThermalProperties {
  Quantity coefficient_of_thermal_expansion = 1;
  Quantity specific_heat = 2;
  MaterialThermalConductivityProperties thermal_conductivity = 3;
  QuantityGenericTable specific_heat_table = 4;
  MaterialInternalRadiationProperties internal_radiation_properties = 5;
}

message MaterialThermalConductivityProperties {
  ThermalConductivitySpecification thermal_conductivity_specification = 1;
  QuantityGenericTable isotropic_thermal_conductivity = 2;
  QuantityGenericTable orthotropic_thermal_conductivity_x = 3;
  QuantityGenericTable orthotropic_thermal_conductivity_y = 4;
  QuantityGenericTable orthotropic_thermal_conductivity_z = 5;
}

message MaterialInternalRadiationProperties {
  Quantity absorption_coefficient = 1;
  Quantity scattering_coefficient = 2;
  Quantity refractive_index = 3;
}

message MaterialElectromagneticProperties {
  Quantity electric_conductivity = 1;
  Quantity relative_permittivity = 2;
  Quantity relative_permeability = 3;
  Quantity electric_loss_tangent = 4;
  Quantity magnetic_loss_tangent = 5;
  QuantityGenericTable electric_conductivity_table = 6;
}

message MaterialEnvironmentalProperties {
  Quantity embodied_energy = 1;
  Quantity co2_footprint = 2;
  optional bool recycle = 3;
}

message MaterialAppearanceProperties {
  int32 alpha = 1;
  int32 red = 2;
  int32 green = 3;
  int32 blue = 4;
  int32 metallic_finish = 5;
  int32 roughness = 6;
  int32 light_transmittance = 7;
}

message MaterialSource {
  GuidEntityIdentifier source_material_id = 1;
  string database_key = 2;
  string history_guid = 3;
}